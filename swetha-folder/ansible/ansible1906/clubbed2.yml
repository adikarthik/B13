---
- name: Playbook 2 Variables + Loops + Register + Until
  hosts: all
  gather_facts: no
  become: yes
  vars:
    users:
      - deepa
      - swetha
      - ram

  tasks:

    - name: Create users
      user:
        name: "{{ item }}"
      loop: "{{ users }}"

    - name: Check uptime
      command: uptime
      register: result
      retries: 3
      delay: 5
      until: result.rc == 0

    - debug:
        var: result.stdout
