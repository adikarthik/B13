- name: Installing and Deploying
  hosts: servers
  become: true

  vars:
   tomcat_dir: /home/azureuser
   URL: https://archive.apache.org/dist/tomcat/tomcat-9/v9.0.89/bin/apache-tomcat-9.0.89.tar.gz
   dir:
    - tomcatdev
    - tomcattest
    - tomcatprod

  tasks:

   - name: Installing Java
     apt:
       name: openjdk-21-jdk
       state: present
       update_cache: yes

   - name: Download Tomcat
     get_url:
          url: "{{ URL }}"
          dest: "{{ tomcat_dir }}"

   - name: Create Env
     file:
        path: "{{ tomcat_dir }}/{{ item }}"
        state: directory
        mode: '0755'
     loop: "{{ dir }}"

   - name: Extract Tomcat
     unarchive:
         src: "{{ tomcat_dir }}/apache-tomcat-9.0.89.tar.gz"
         dest: "{{ tomcat_dir }}/{{ item }}"
         remote_src: yes
     loop: "{{ dir }}"


   - name: Copy Artifact
     copy:
        src: "/home/rohithuser/E2ETask/Amazon/Amazon/Amazon-Web/target/Amazon.war"
        dest: "{{ tomcat_dir }}/{{ item }}/apache-tomcat-9.0.89/webapps/Amazon.war"
     loop: "{{ dir }}"

   - name: Start Tomcat
     shell: "{{ tomcat_dir }}/tomcatdev/apache-tomcat-9.0.89/bin/startup.sh"
