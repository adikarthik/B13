---
- name: Tomcat Deployment using Tags
  hosts: client_servers
  become: true
  tasks:
    - name: installing java
      apt:
        name: openjdk-11-jdk
        state: present
        update_cache: true
      tags:
        - java
    - name: creating tomcat directory
      file:
        path: /opt/tomcat
        state: directory
        mode: "0755"
      tags:
        - tomcat
    - name: downloading tomcat
      shell: wget
        https://archive.apache.org/dist/tomcat/tomcat-9/v9.0.85/bin/apache-tomcat-9.0.85.tar.gz
        -o /tmp/apache-tomcat.tar.gz
      tags:
        - tomcat
    - name: starting tomcat
      shell: /opt/tomcat/bin/startup.sh
      tags:
        - start
